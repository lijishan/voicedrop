name: Mine articles

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours
  workflow_dispatch: {}

concurrency:
  group: mine
  cancel-in-progress: false

jobs:
  mine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: mining/requirements.txt

      - name: Install ffmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install deps
        run: pip install -r mining/requirements.txt

      - name: Mine
        run: python mining/mine.py
        env:
          FILES_TOKEN:           ${{ secrets.FILES_TOKEN }}
          CLAUDE_API_KEY:        ${{ secrets.CLAUDE_API_KEY }}
          VOLC_ASR_APPID:        ${{ secrets.VOLC_ASR_APPID }}
          VOLC_ASR_ACCESS_TOKEN: ${{ secrets.VOLC_ASR_ACCESS_TOKEN }}
          WECHAT_PROXY:          ${{ secrets.WECHAT_PROXY }}
