name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'mining/**'
      - '.github/workflows/mine.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      destination:
        description: 'Where to ship'
        required: true
        default: 'testflight'
        type: choice
        options:
          - testflight   # build + upload to TestFlight (same as a push to main)
          - appstore     # submit the build already on TestFlight to App Store review
          - certs        # one-shot: run match refresh_profiles (create/sync signing profiles), no build/upload
      force:
        description: 'appstore only: replace a version already WAITING_FOR_REVIEW (reject + resubmit)'
        required: false
        default: false
        type: boolean

# Serialize all builds: two parallel runs would each compute
# latest_testflight_build_number + 1 and collide on the same build number.
# cancel-in-progress: false → queue rather than kill an in-flight upload/submit.
concurrency:
  group: build
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.FEEDBACK_PAT }}

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      # VoiceDrop uses XcodeGen + a gitignored Secrets.xcconfig (FILES_TOKEN).
      # Recreate both before any build step.
      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Write Secrets.xcconfig
        run: |
          printf 'FILES_TOKEN = %s\n' "${{ secrets.FILES_TOKEN }}" > Secrets.xcconfig
          printf 'POSTHOG_API_KEY = %s\n' "${{ secrets.POSTHOG_API_KEY }}" >> Secrets.xcconfig

      - name: Generate Xcode project
        run: xcodegen generate

      # PRs + 不带 [tf] 的普通 push：build only（验证编译，不签名不上传）。
      # 2026-07-09 起 TestFlight 上传改为 OPT-IN：苹果对每 app 有 ~20 个/24h 的
      # 上传限额，之前「每 push 必发」在高强度迭代日把限额烧光（409）。想发版：
      # commit message 带 [tf]，或手动 workflow_dispatch（destination=testflight）。
      - name: Build for verification
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && !contains(github.event.head_commit.message, '[tf]'))
        run: |
          xcodebuild build \
            -project VoiceDrop.xcodeproj \
            -scheme VoiceDrop \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO

      # Push to main → TestFlight. Manual "appstore" dispatch → submit for review
      # (reuses the build already on TestFlight; metadata + screenshots come from
      # fastlane/metadata + fastlane/screenshots).
      - name: Run fastlane
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[tf]'))
        env:
          MATCH_PASSWORD:       ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTH: ${{ secrets.MATCH_GIT_BASIC_AUTH }}
          ASC_API_KEY_ID:       ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID:    ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY_CONTENT:  ${{ secrets.ASC_API_KEY_CONTENT }}
        run: |
          if [ "${{ github.event.inputs.destination }}" = "certs" ]; then
            bundle exec fastlane refresh_profiles
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.destination }}" = "appstore" ]; then
            bundle exec fastlane release skip_build:true force:${{ inputs.force && 'true' || 'false' }}
          else
            bundle exec fastlane beta
          fi

      - name: Push tags
        if: success() && (github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && contains(github.event.head_commit.message, '[tf]')))
        run: git push --tags || true
