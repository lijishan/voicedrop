name: VoiceDrop
options:
  bundleIdPrefix: com.wangjianshuo
  # 中文字面量就是本地化 key（省去全量改代码）；英文翻译放 Localizable.xcstrings
  developmentLanguage: zh-Hans
  deploymentTarget:
    iOS: "18.0"

packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: 3.0.0

targets:
  VoiceDrop:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VoiceDropApp
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    info:
      path: VoiceDropApp/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleDisplayName: VoiceDrop
        # PostHog project key 从 Secrets.xcconfig 注入（CI 由 build.yml 重建该文件）
        PostHogAPIKey: "$(POSTHOG_API_KEY)"
        CFBundleURLTypes:
          - CFBundleURLName: com.wangjianshuo.VoiceDrop
            CFBundleURLSchemes:
              - voicedrop
        NSMicrophoneUsageDescription: "VoiceDrop 录下你的口述，并上传到你的文件中转站。"
        NSCameraUsageDescription: "VoiceDrop 可在录音过程中拍摄场景照片，随录音一起保存。"
        NSPhotoLibraryAddUsageDescription: "VoiceDrop 把你拍的场景照片在系统相册里也存一份。"
        NSSpeechRecognitionUsageDescription: "VoiceDrop 用语音识别把你对文章的修改要求转成文字，发给服务器。"
        NSLocationWhenInUseUsageDescription: "VoiceDrop 把当前位置（如城市/城区）写进录音文件名，方便日后辨认。可拒绝，录音照常。"
        UIBackgroundModes:
          - audio
        UILaunchScreen:
          UIColorName: ""
        NSUbiquitousContainers:
          iCloud.com.wangjianshuo.VoiceDrop:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: VoiceDrop
            NSUbiquitousContainerSupportedFolderLevels: Any
    entitlements:
      path: VoiceDropApp/VoiceDrop.entitlements
      properties:
        # APNs（文章挖好了推送 + 运维报警）。文件里写 development；App Store 导出
        # re-sign 时按分发描述文件自动换成 production，无需双文件。
        aps-environment: development
        # Universal links：voicedrop.cn / 老分享域 jianshuo.dev 的链接直接拉起 App
        #（AASA 文件在 jianshuo.dev Pages 项目的 .well-known/ 与 voicedrop/.well-known/）。
        com.apple.developer.associated-domains:
          - applinks:voicedrop.cn
          - applinks:www.voicedrop.cn
          - applinks:jianshuo.dev
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.wangjianshuo.VoiceDrop
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.wangjianshuo.VoiceDrop
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.security.application-groups:
          - group.com.wangjianshuo.VoiceDrop
    dependencies:
      - target: VoiceDropShare
      - package: PostHog
    scheme:
      testTargets:
        - VoiceDropTests
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.4"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjianshuo.VoiceDrop
        DEVELOPMENT_TEAM: 97XBW2A43H
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        OTHER_LDFLAGS: "$(inherited) -lz"
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        # Debug = AUTOMATIC signing → local device install uses an Apple *Development*
        # profile (with the connected device), so `⌘R` to a real phone works with no
        # manual profile picking and no 0xe800801f "Beta profile" error. Manual match
        # signing is ONLY for the App Store Release build (CI/fastlane).
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.wangjianshuo.VoiceDrop"

  VoiceDropShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VoiceDropShare
      - path: VoiceDropApp/Networking.swift   # AppGroup bridge + setBearer, shared verbatim
      - path: VoiceDropApp/RecordingName.swift   # recording-style filename builder, pure Foundation
    info:
      path: VoiceDropShare/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleDisplayName: VoiceDrop
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsImageWithMaxCount: 12
              NSExtensionActivationSupportsFileWithMaxCount: 12
    entitlements:
      path: VoiceDropShare/VoiceDropShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.wangjianshuo.VoiceDrop
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.4"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjianshuo.VoiceDrop.Share
        DEVELOPMENT_TEAM: 97XBW2A43H
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          CODE_SIGN_STYLE: Automatic
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.wangjianshuo.VoiceDrop.Share"

  VoiceDropTests:
    type: bundle.unit-test
    platform: iOS
    sources: [VoiceDropTests]
    dependencies:
      - target: VoiceDrop
    settings:
      GENERATE_INFOPLIST_FILE: YES
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/VoiceDrop.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/VoiceDrop"
      BUNDLE_LOADER: "$(TEST_HOST)"
