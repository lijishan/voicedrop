name: VoiceDrop
options:
  bundleIdPrefix: com.wangjianshuo
  deploymentTarget:
    iOS: "18.0"

targets:
  VoiceDrop:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VoiceDropApp
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    info:
      path: VoiceDropApp/Info.plist
      properties:
        CFBundleDisplayName: VoiceDrop
        NSMicrophoneUsageDescription: "VoiceDrop 录下你的口述，并上传到你的文件中转站。"
        NSCameraUsageDescription: "VoiceDrop 可在录音过程中拍摄场景照片，随录音一起保存。"
        NSSpeechRecognitionUsageDescription: "VoiceDrop 用语音识别把你对文章的修改要求转成文字，发给服务器。"
        NSLocationWhenInUseUsageDescription: "VoiceDrop 把当前位置（如城市/城区）写进录音文件名，方便日后辨认。可拒绝，录音照常。"
        UIBackgroundModes:
          - audio
        UILaunchScreen:
          UIColorName: ""
        NSUbiquitousContainers:
          iCloud.com.wangjianshuo.VoiceDrop:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: VoiceDrop
            NSUbiquitousContainerSupportedFolderLevels: Any
    entitlements:
      path: VoiceDropApp/VoiceDrop.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.wangjianshuo.VoiceDrop
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.wangjianshuo.VoiceDrop
        com.apple.developer.icloud-services:
          - CloudDocuments
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjianshuo.VoiceDrop
        DEVELOPMENT_TEAM: 97XBW2A43H
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
