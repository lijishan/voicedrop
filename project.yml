name: VoiceDrop
options:
  bundleIdPrefix: com.wangjianshuo
  deploymentTarget:
    iOS: "18.0"

targets:
  VoiceDrop:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VoiceDropApp
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    info:
      path: VoiceDropApp/Info.plist
      properties:
        CFBundleDisplayName: VoiceDrop
        NSMicrophoneUsageDescription: "VoiceDrop 录下你的口述，并上传到你的文件中转站。"
        NSCameraUsageDescription: "VoiceDrop 可在录音过程中拍摄场景照片，随录音一起保存。"
        NSPhotoLibraryAddUsageDescription: "VoiceDrop 把你拍的场景照片在系统相册里也存一份。"
        NSSpeechRecognitionUsageDescription: "VoiceDrop 用语音识别把你对文章的修改要求转成文字，发给服务器。"
        NSLocationWhenInUseUsageDescription: "VoiceDrop 把当前位置（如城市/城区）写进录音文件名，方便日后辨认。可拒绝，录音照常。"
        UIBackgroundModes:
          - audio
        UILaunchScreen:
          UIColorName: ""
        NSUbiquitousContainers:
          iCloud.com.wangjianshuo.VoiceDrop:
            NSUbiquitousContainerIsDocumentScopePublic: true
            NSUbiquitousContainerName: VoiceDrop
            NSUbiquitousContainerSupportedFolderLevels: Any
    entitlements:
      path: VoiceDropApp/VoiceDrop.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.wangjianshuo.VoiceDrop
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.wangjianshuo.VoiceDrop
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.security.application-groups:
          - group.com.wangjianshuo.VoiceDrop
    dependencies:
      - target: VoiceDropShare
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjianshuo.VoiceDrop
        DEVELOPMENT_TEAM: 97XBW2A43H
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        # Manual signing only for the App Store build (CI/fastlane). Debug stays
        # automatic so local dev / simulator runs need no profile.
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.wangjianshuo.VoiceDrop"

  VoiceDropShare:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: VoiceDropShare
      - path: VoiceDropApp/Networking.swift   # AppGroup bridge + setBearer, shared verbatim
    info:
      path: VoiceDropShare/Info.plist
      properties:
        CFBundleDisplayName: VoiceDrop
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsImageWithMaxCount: 12
              NSExtensionActivationSupportsFileWithMaxCount: 12
    entitlements:
      path: VoiceDropShare/VoiceDropShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.wangjianshuo.VoiceDrop
    settings:
      base:
        SWIFT_VERSION: "6.0"
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.wangjianshuo.VoiceDrop.Share
        DEVELOPMENT_TEAM: 97XBW2A43H
        TARGETED_DEVICE_FAMILY: "1"
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Apple Distribution"
          PROVISIONING_PROFILE_SPECIFIER: "match AppStore com.wangjianshuo.VoiceDrop.Share"
